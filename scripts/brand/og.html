<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html,
      body {
        margin: 0;
        width: 1200px;
        height: 630px;
        background: #020617;
        font-family:
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Helvetica,
          Arial,
          sans-serif;
      }
      .stage {
        width: 1200px;
        height: 630px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 32px;
      }
      .mark {
        width: 160px;
        height: 160px;
      }
      .wordmark {
        color: #f8fafc;
        font-size: 72px;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin: 0;
      }
      .tagline {
        color: #94a3b8;
        font-size: 28px;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <svg
        class="mark"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 48 48"
        role="img"
        aria-label="RoomCast"
      >
        <rect x="6" y="14" width="28" height="24" rx="5" fill="#005EB8" />
        <g fill="none" stroke="#005EB8" stroke-width="3" stroke-linecap="round">
          <path d="M32 16a8 8 0 0 1 8 8" />
          <path d="M32 10a14 14 0 0 1 14 14" />
        </g>
      </svg>
      <p class="wordmark">RoomCast</p>
      <p class="tagline">Beam any document to the whole room.</p>
    </div>
  </body>
</html>
