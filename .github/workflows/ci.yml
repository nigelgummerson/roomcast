name: CI
on:
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test           # unit tests
      - run: npm run test:build      # build + check-build (base path, PWA, SW)
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e        # type-check e2e + browser e2e (routing, pipeline, zxing decode)
